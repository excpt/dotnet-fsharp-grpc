syntax = "proto3";
package store;

enum Priority {
  PRIORITY_LOW = 0;
  PRIORITY_MEDIUM = 1;
  PRIORITY_HIGH = 2;
}

message Tag {
  string key = 1;
  string value = 2;
}

message Task {
  string id = 1;
  string title = 2;
  string description = 3;
  Priority priority = 4;
  bool completed = 5;
  repeated Tag tags = 6;
  optional string assignee = 7;
  map<string, string> metadata = 8;
}

message TaskList {
  string name = 1;
  repeated Task tasks = 2;
}

message SuccessStory {
  string name = 1;
  TaskList task_list = 2;
}
